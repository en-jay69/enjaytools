<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sudoku</title>
<style>
  :root{
    --ink:#1b2733;
    --paper:#f7f5f0;
    --box-alt:#ece9e1;
    --teal:#2e6f6c;
    --teal-soft:#d8e7e5;
    --error:#b5483a;
    --note:#8a8578;
    --line:#c9c4b8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:14px 12px 24px;
  }
  header{width:100%;max-width:440px;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  h1{
    font-family:Georgia,'Times New Roman',serif;
    font-style:italic;font-weight:600;
    font-size:1.7rem;margin:0;letter-spacing:.02em;
  }
  #timer{font-variant-numeric:tabular-nums;color:var(--note);font-size:.95rem}
  .diff-row{width:100%;max-width:440px;display:flex;gap:8px;margin-bottom:12px}
  .diff-row button{
    flex:1;padding:8px 0;border:1.5px solid var(--line);border-radius:999px;
    background:transparent;color:var(--ink);font-size:.9rem;cursor:pointer;
  }
  .diff-row button.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}
  #board{
    width:100%;max-width:440px;aspect-ratio:1;
    display:grid;grid-template-columns:repeat(9,1fr);
    border:3px solid var(--ink);border-radius:6px;overflow:hidden;
    background:var(--paper);
    touch-action:manipulation;
  }
  .cell{
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(1.1rem,5.2vw,1.6rem);
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    cursor:pointer;position:relative;user-select:none;
    font-variant-numeric:tabular-nums;
  }
  .cell.box-alt{background:var(--box-alt)}
  .cell.bR{border-right:2.5px solid var(--ink)}
  .cell.bB{border-bottom:2.5px solid var(--ink)}
  .cell:nth-child(9n){border-right:none}
  .cell.peer{background:var(--teal-soft)}
  .cell.same{background:var(--teal-soft);font-weight:700}
  .cell.sel{outline:3px solid var(--teal);outline-offset:-3px;background:var(--teal-soft)}
  .cell.given{font-weight:700;color:var(--ink)}
  .cell.user{color:var(--teal);font-weight:600}
  .cell.conflict{color:var(--error)}
  .cell.wrong{color:var(--error)}
  .notes{
    position:absolute;inset:0;display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    font-size:clamp(.45rem,2vw,.62rem);color:var(--note);font-weight:500;
    pointer-events:none;
  }
  .notes span{display:flex;align-items:center;justify-content:center}
  .pad{
    width:100%;max-width:440px;display:grid;grid-template-columns:repeat(9,1fr);
    gap:6px;margin-top:14px;
  }
  .pad button{
    aspect-ratio:1;font-size:1.3rem;font-weight:600;
    border:1.5px solid var(--line);border-radius:10px;
    background:#fff;color:var(--ink);cursor:pointer;
    font-variant-numeric:tabular-nums;
  }
  .pad button:active{transform:scale(.93)}
  .pad button.done{opacity:.25;pointer-events:none}
  .tools{width:100%;max-width:440px;display:flex;gap:8px;margin-top:10px}
  .tools button{
    flex:1;padding:11px 0;font-size:.92rem;border:1.5px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);cursor:pointer;
  }
  .tools button:active{transform:scale(.97)}
  .tools button.on{background:var(--teal);border-color:var(--teal);color:#fff}
  #msg{
    max-width:440px;width:100%;text-align:center;margin-top:14px;
    min-height:1.4em;font-size:.95rem;color:var(--note);
  }
  #msg.win{color:var(--teal);font-weight:700;font-size:1.05rem}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  .cell.pop{animation:pop .35s ease}
  @media (prefers-reduced-motion: reduce){
    .cell.pop{animation:none}
    .pad button:active,.tools button:active{transform:none}
  }
  button:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
</style>
</head>
<body>
<header>
  <h1>Sudoku</h1>
  <div id="timer">0:00</div>
</header>

<div class="diff-row">
  <button data-d="easy">Easy</button>
  <button data-d="medium" class="active">Medium</button>
  <button data-d="hard">Hard</button>
</div>

<div id="board" role="grid" aria-label="Sudoku board"></div>

<div class="pad" id="pad"></div>

<div class="tools">
  <button id="notesBtn">✎ Notes</button>
  <button id="eraseBtn">Erase</button>
  <button id="undoBtn">Undo</button>
  <button id="checkBtn">Check</button>
  <button id="newBtn">New</button>
</div>

<div id="msg"></div>

<script>
(function(){
  // ---------- generator ----------
  const N = 9;
  function shuffled(a){
    a = a.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }
  function ok(g,r,c,v){
    for(let i=0;i<9;i++){
      if(g[r*9+i]===v || g[i*9+c]===v) return false;
    }
    const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
    for(let i=0;i<3;i++)for(let j=0;j<3;j++){
      if(g[(br+i)*9+bc+j]===v) return false;
    }
    return true;
  }
  function fill(g,pos){
    if(pos===81) return true;
    if(g[pos]!==0) return fill(g,pos+1);
    const r=Math.floor(pos/9), c=pos%9;
    for(const v of shuffled([1,2,3,4,5,6,7,8,9])){
      if(ok(g,r,c,v)){
        g[pos]=v;
        if(fill(g,pos+1)) return true;
        g[pos]=0;
      }
    }
    return false;
  }
  // count solutions, bail at 2
  function countSol(g,pos,cap){
    if(pos===81) return 1;
    if(g[pos]!==0) return countSol(g,pos+1,cap);
    const r=Math.floor(pos/9), c=pos%9;
    let n=0;
    for(let v=1;v<=9;v++){
      if(ok(g,r,c,v)){
        g[pos]=v;
        n+=countSol(g,pos+1,cap-n);
        g[pos]=0;
        if(n>=cap) return n;
      }
    }
    return n;
  }
  function generate(givens){
    const sol = new Array(81).fill(0);
    fill(sol,0);
    const puz = sol.slice();
    // remove symmetric pairs while uniqueness holds
    const order = shuffled([...Array(81).keys()]);
    let filled = 81;
    for(const i of order){
      if(filled<=givens) break;
      const j = 80-i;
      const a=puz[i], b=puz[j];
      if(a===0 && b===0) continue;
      puz[i]=0; puz[j]=0;
      const removed = (i===j)?1:2;
      if(countSol(puz.slice(),0,2)!==1){
        puz[i]=a; puz[j]=b;
      } else {
        filled -= removed;
      }
    }
    return {puz, sol};
  }

  // ---------- state ----------
  const DIFF = {easy:40, medium:32, hard:27};
  let diff='medium', puzzle, solution, given, notes, sel=-1, notesMode=false;
  let undoStack=[], startTime=0, timerId=null, done=false;

  const boardEl=document.getElementById('board');
  const padEl=document.getElementById('pad');
  const msgEl=document.getElementById('msg');
  const timerEl=document.getElementById('timer');

  // build cells once
  const cells=[];
  for(let i=0;i<81;i++){
    const d=document.createElement('div');
    d.className='cell';
    d.setAttribute('role','gridcell');
    const r=Math.floor(i/9), c=i%9;
    const box=Math.floor(r/3)*3+Math.floor(c/3);
    if(box%2===1) d.classList.add('box-alt');
    if(c===2||c===5) d.classList.add('bR');
    if(r===2||r===5) d.classList.add('bB');
    d.addEventListener('click',()=>select(i));
    boardEl.appendChild(d);
    cells.push(d);
  }
  for(let v=1;v<=9;v++){
    const b=document.createElement('button');
    b.textContent=v;
    b.dataset.v=v;
    b.addEventListener('click',()=>input(v));
    padEl.appendChild(b);
  }

  function newGame(){
    msgEl.textContent='Generating…';
    msgEl.classList.remove('win');
    // let the message paint before the (brief) generation work
    setTimeout(()=>{
      const g=generate(DIFF[diff]);
      solution=g.sol;
      puzzle=g.puz.slice();
      given=g.puz.map(v=>v!==0);
      notes=Array.from({length:81},()=>new Set());
      undoStack=[]; sel=-1; done=false;
      startTime=Date.now();
      if(timerId) clearInterval(timerId);
      timerId=setInterval(tick,1000);
      tick();
      msgEl.textContent='';
      render();
    },30);
  }
  function tick(){
    const s=Math.floor((Date.now()-startTime)/1000);
    timerEl.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }

  function select(i){
    if(done) return;
    sel = (sel===i)? -1 : i;
    render();
  }

  function pushUndo(i){
    undoStack.push({i, v:puzzle[i], n:new Set(notes[i])});
    if(undoStack.length>200) undoStack.shift();
  }

  function input(v){
    if(done || sel<0 || given[sel]) return;
    pushUndo(sel);
    if(notesMode){
      if(notes[sel].has(v)) notes[sel].delete(v); else notes[sel].add(v);
      puzzle[sel]=0;
    } else {
      puzzle[sel] = (puzzle[sel]===v)?0:v;
      notes[sel].clear();
      if(puzzle[sel]!==0){
        cells[sel].classList.remove('pop');
        void cells[sel].offsetWidth;
        cells[sel].classList.add('pop');
        clearNotesInPeers(sel,v);
      }
    }
    checkWin();
    render();
  }

  function clearNotesInPeers(i,v){
    const r=Math.floor(i/9), c=i%9;
    const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
    for(let k=0;k<9;k++){
      notes[r*9+k].delete(v);
      notes[k*9+c].delete(v);
      notes[(br+Math.floor(k/3))*9+bc+(k%3)].delete(v);
    }
  }

  function erase(){
    if(done || sel<0 || given[sel]) return;
    pushUndo(sel);
    puzzle[sel]=0;
    notes[sel].clear();
    render();
  }

  function undo(){
    if(done) return;
    const u=undoStack.pop();
    if(!u) return;
    puzzle[u.i]=u.v;
    notes[u.i]=u.n;
    render();
  }

  function conflicts(){
    const bad=new Set();
    for(let i=0;i<81;i++){
      const v=puzzle[i];
      if(v===0) continue;
      const r=Math.floor(i/9), c=i%9;
      for(let k=0;k<9;k++){
        const a=r*9+k, b=k*9+c;
        if(a!==i && puzzle[a]===v){bad.add(i);bad.add(a);}
        if(b!==i && puzzle[b]===v){bad.add(i);bad.add(b);}
      }
      const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
      for(let x=0;x<3;x++)for(let y=0;y<3;y++){
        const j=(br+x)*9+bc+y;
        if(j!==i && puzzle[j]===v){bad.add(i);bad.add(j);}
      }
    }
    return bad;
  }

  function check(){
    if(done) return;
    let wrong=0, empty=0;
    for(let i=0;i<81;i++){
      cells[i].classList.remove('wrong');
      if(puzzle[i]===0){empty++;continue;}
      if(puzzle[i]!==solution[i]){
        wrong++;
        if(!given[i]) cells[i].classList.add('wrong');
      }
    }
    if(wrong===0 && empty===0){ /* handled by checkWin */ }
    else if(wrong===0) msgEl.textContent = 'No mistakes so far — '+empty+' to go.';
    else msgEl.textContent = wrong+' cell'+(wrong>1?'s':'')+' off the mark.';
  }

  function checkWin(){
    for(let i=0;i<81;i++) if(puzzle[i]!==solution[i]) return;
    done=true;
    clearInterval(timerId);
    msgEl.textContent='Solved in '+timerEl.textContent+' — nice work.';
    msgEl.classList.add('win');
    sel=-1;
  }

  function render(){
    const bad=conflicts();
    const selVal = sel>=0 ? puzzle[sel] : 0;
    const selR = sel>=0 ? Math.floor(sel/9) : -1;
    const selC = sel>=0 ? sel%9 : -1;
    const selB = sel>=0 ? Math.floor(selR/3)*3+Math.floor(selC/3) : -1;
    const counts=new Array(10).fill(0);
    for(let i=0;i<81;i++) if(puzzle[i]) counts[puzzle[i]]++;

    for(let i=0;i<81;i++){
      const d=cells[i];
      const r=Math.floor(i/9), c=i%9;
      const b=Math.floor(r/3)*3+Math.floor(c/3);
      d.classList.remove('sel','peer','same','conflict','given','user');
      d.classList.toggle('given',given[i]);
      d.classList.toggle('user',!given[i]&&puzzle[i]!==0);
      if(sel>=0 && !done){
        if(i===sel) d.classList.add('sel');
        else if(r===selR||c===selC||b===selB) d.classList.add('peer');
        if(selVal!==0 && puzzle[i]===selVal && i!==sel) d.classList.add('same');
      }
      if(bad.has(i)) d.classList.add('conflict');
      if(puzzle[i]!==0){
        d.textContent=puzzle[i];
      } else if(notes[i].size){
        d.textContent='';
        const n=document.createElement('div');
        n.className='notes';
        for(let v=1;v<=9;v++){
          const s=document.createElement('span');
          s.textContent = notes[i].has(v)? v : '';
          n.appendChild(s);
        }
        d.appendChild(n);
      } else {
        d.textContent='';
      }
    }
    // dim completed digits on pad
    padEl.querySelectorAll('button').forEach(b=>{
      b.classList.toggle('done', counts[+b.dataset.v]>=9);
    });
  }

  // ---------- wiring ----------
  document.querySelectorAll('.diff-row button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.diff-row button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      diff=b.dataset.d;
      newGame();
    });
  });
  document.getElementById('notesBtn').addEventListener('click',function(){
    notesMode=!notesMode;
    this.classList.toggle('on',notesMode);
  });
  document.getElementById('eraseBtn').addEventListener('click',erase);
  document.getElementById('undoBtn').addEventListener('click',undo);
  document.getElementById('checkBtn').addEventListener('click',check);
  document.getElementById('newBtn').addEventListener('click',newGame);

  // keyboard support (desktop)
  document.addEventListener('keydown',e=>{
    if(e.key>='1'&&e.key<='9') input(+e.key);
    else if(e.key==='Backspace'||e.key==='Delete') erase();
    else if(e.key==='n'||e.key==='N') document.getElementById('notesBtn').click();
    else if(sel>=0){
      const r=Math.floor(sel/9), c=sel%9;
      if(e.key==='ArrowUp'&&r>0) select(sel-9);
      else if(e.key==='ArrowDown'&&r<8) select(sel+9);
      else if(e.key==='ArrowLeft'&&c>0) select(sel-1);
      else if(e.key==='ArrowRight'&&c<8) select(sel+1);
    }
  });

  newGame();
})();
</script>
</body>
</html>
